<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DormAlign | Student Submissions</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --page-bg: #edf3ff;
            --line: #c9d9ff;
            --blue: #1d4ed8;
            --purple: #7c3aed;
            --light-blue: #0ea5e9;
            --sidebar: #0e1f4a;
            --sidebar-2: #142d67;
            --ink: #12244c;
        }

        body {
            margin: 0;
            font-family: "Manrope", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(900px 500px at 100% -20%, #d9f0ff 0%, rgba(217,240,255,0) 60%),
                radial-gradient(800px 450px at -10% 120%, #c7d9ff 0%, rgba(199,217,255,0) 60%),
                var(--page-bg);
        }

        .admin-shell { min-height: 100vh; display: flex; }

        .admin-sidebar {
            width: 268px;
            background: linear-gradient(180deg, var(--sidebar), var(--sidebar-2));
            padding: 20px 14px;
            position: sticky;
            top: 0;
            height: 100vh;
            border-right: 1px solid rgba(164, 186, 255, 0.22);
        }

        .brand-pill {
            border-radius: 14px;
            background: linear-gradient(120deg, #4f46e5, #9333ea);
            color: #fff;
            font-weight: 800;
            text-align: center;
            padding: 14px 12px;
            margin-bottom: 18px;
        }

        .side-nav { display: grid; gap: 8px; }

        .side-link {
            color: #e5edff;
            text-decoration: none;
            font-weight: 700;
            border-radius: 12px;
            padding: 11px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid transparent;
        }

        .side-link:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .side-link.active { background: linear-gradient(120deg, #4f46e5, #9333ea); color: #fff; }

        .admin-main { flex: 1; padding: 24px; }

        .hero {
            border: 1px solid #d5e2ff;
            border-radius: 20px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 18px 35px rgba(18, 42, 120, 0.14);
            margin-bottom: 16px;
        }

        .hero-banner {
            background: linear-gradient(115deg, var(--blue), var(--purple), var(--light-blue));
            color: #f8fbff;
            padding: 18px 20px;
        }

        .hero-banner h1 { margin: 0; font-size: 1.5rem; font-weight: 800; }

        .btn-soft {
            border-radius: 10px;
            border: 1px solid #c8d8ff;
            background: #f4f8ff;
            color: #1f3d79;
            font-weight: 700;
            padding: 7px 11px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-soft:hover { background: #e9f1ff; color: #153362; }

        /* Panel used by React */
        .panel {
            border: 1px solid #d5e2ff;
            border-radius: 16px;
            background: #fff;
            overflow: hidden;
            box-shadow: 0 10px 24px rgba(19, 47, 130, 0.1);
        }

        .table-wrap { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1120px;
        }

        th, td {
            padding: 10px 12px;
            border-bottom: 1px solid #e4edff;
            font-size: 0.9rem;
            vertical-align: middle;
        }

        th {
            color: #3f5687;
            text-transform: uppercase;
            letter-spacing: 0.55px;
            font-size: 0.72rem;
            font-weight: 800;
            background: #fbfdff;
            white-space: nowrap;
        }

        tr:last-child td { border-bottom: none; }

        /* Search bar + filter strip */
        .filter-strip {
            padding: 12px 14px;
            background: #f8fbff;
            border-bottom: 1px solid #d5e2ff;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-input {
            border-radius: 10px;
            border: 1px solid #c8d8ff;
            padding: 8px 12px;
            font-family: "Manrope", sans-serif;
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--ink);
            flex: 1;
            min-width: 200px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .filter-input:focus {
            border-color: #82b0ff;
            box-shadow: 0 0 0 3px rgba(29, 78, 216, 0.12);
        }

        .filter-select {
            border-radius: 10px;
            border: 1px solid #c8d8ff;
            padding: 8px 12px;
            font-family: "Manrope", sans-serif;
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--ink);
            background: #fff;
            outline: none;
            cursor: pointer;
        }

        .filter-count {
            font-size: 0.82rem;
            color: #5d6d93;
            font-weight: 700;
            margin-left: auto;
            white-space: nowrap;
        }

        @media (max-width: 992px) {
            .admin-shell { display: block; }
            .admin-sidebar {
                width: 100%;
                height: auto;
                position: relative;
                border-right: 0;
                border-bottom: 1px solid rgba(164, 186, 255, 0.22);
            }
            .side-nav { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .admin-main { padding: 16px; }
        }

        @media (max-width: 640px) {
            .side-nav { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="admin-shell">
    <aside class="admin-sidebar">
        <div class="brand-pill">Admin Portal</div>
        <nav class="side-nav">
            <a class="side-link" href="/admin/dashboard"><i class="fa-solid fa-chart-line"></i>Dashboard</a>
            <a class="side-link" href="/"><i class="fa-solid fa-house"></i>Return Home</a>
            <a class="side-link" href="/admin/profile"><i class="fa-solid fa-user-shield"></i>Admin Profile</a>
            <a class="side-link" href="/admin/view/compatibility"><i class="fa-solid fa-heart-pulse"></i>Compatibility</a>
            <a class="side-link active" href="/submissions"><i class="fa-solid fa-users"></i>All Students</a>
            <a class="side-link" href="/admin/pending-requests"><i class="fa-solid fa-hourglass-half"></i>Pending Requests</a>
            <a class="side-link" href="/admin/rooms"><i class="fa-solid fa-bed"></i>Room Management</a>
            <a class="side-link" href="/logout"><i class="fa-solid fa-right-from-bracket"></i>Logout</a>
        </nav>
    </aside>

    <main class="admin-main">
        <section class="hero">
            <div class="hero-banner">
                <h1>Student Submissions</h1>
            </div>
        </section>

        <div class="mb-3 d-flex gap-2 flex-wrap">
            <a class="btn-soft" href="/admin/dashboard"><i class="fa-solid fa-arrow-left"></i>Return to Dashboard</a>
            <a class="btn-soft" href="/"><i class="fa-solid fa-house"></i>Return Home</a>
        </div>

        <!-- React mounts here — students data injected via data attribute -->
        <div
            id="submissions-root"
            data-students="{{ students | tojson }}"
        ></div>
    </main>
</div>

<!-- React CDN -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

{% raw %}
<script type="text/babel">
    const HEADERS = ['ID', 'Name', 'Gender', 'Dept', 'Year', 'Hostel', 'Sleep', 'Clean', 'Noise', 'Guests', 'Study', 'Room'];
    const HEADER_ICONS = [null, null, null, null, null, null, '🌙', '🧹', '🔊', '👥', '📖', '🚪'];

    function SubmissionsTable({ students }) {
        const [query, setQuery] = React.useState('');
        const [filterHostel, setFilterHostel] = React.useState('All');
        const [filterGender, setFilterGender] = React.useState('All');

        // derive unique hostel and gender options from data
        const hostels = ['All', ...new Set(students.map(s => s[5]).filter(Boolean))];
        const genders = ['All', ...new Set(students.map(s => s[2]).filter(Boolean))];

        const filtered = students.filter(s => {
            const q = query.toLowerCase();
            const matchesSearch =
                String(s[1] || '').toLowerCase().includes(q) ||
                String(s[3] || '').toLowerCase().includes(q) ||
                String(s[0] || '').toLowerCase().includes(q);
            const matchesHostel = filterHostel === 'All' || s[5] === filterHostel;
            const matchesGender = filterGender === 'All' || s[2] === filterGender;
            return matchesSearch && matchesHostel && matchesGender;
        });

        return (
            <section className="panel">
                <div className="filter-strip">
                    <input
                        className="filter-input"
                        type="text"
                        placeholder="Search by name, department, or ID..."
                        value={query}
                        onChange={e => setQuery(e.target.value)}
                    />
                    <select
                        className="filter-select"
                        value={filterHostel}
                        onChange={e => setFilterHostel(e.target.value)}
                    >
                        {hostels.map(h => <option key={h} value={h}>{h}</option>)}
                    </select>
                    <select
                        className="filter-select"
                        value={filterGender}
                        onChange={e => setFilterGender(e.target.value)}
                    >
                        {genders.map(g => <option key={g} value={g}>{g}</option>)}
                    </select>
                    <span className="filter-count">
                        {filtered.length} of {students.length} students
                    </span>
                </div>

                <div className="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                {HEADERS.map((h, i) => (
                                    <th key={h}>
                                        {HEADER_ICONS[i] && <span style={{ marginRight: '4px' }}>{HEADER_ICONS[i]}</span>}
                                        {h}
                                    </th>
                                ))}
                            </tr>
                        </thead>
                        <tbody>
                            {filtered.length === 0 ? (
                                <tr>
                                    <td colSpan={12} style={{ textAlign: 'center', padding: '24px', color: '#5d6d93' }}>
                                        No students match your search.
                                    </td>
                                </tr>
                            ) : (
                                filtered.map(s => (
                                    <tr key={s[0]}>
                                        {s.map((val, i) => (
                                            <td key={i}>
                                                {val === null || val === undefined ? '-' : String(val)}
                                            </td>
                                        ))}
                                    </tr>
                                ))
                            )}
                        </tbody>
                    </table>
                </div>
            </section>
        );
    }

    const el = document.getElementById('submissions-root');
    const students = JSON.parse(el.dataset.students || '[]');
    ReactDOM.createRoot(el).render(<SubmissionsTable students={students} />);
</script>
{% endraw %}
</body>
</html>
